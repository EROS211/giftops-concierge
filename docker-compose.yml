services:
  postgres:
    image: postgres:16-alpine
    container_name: giftops-postgres
    environment:
      POSTGRES_USER: giftops
      POSTGRES_PASSWORD: giftops
      POSTGRES_DB: giftops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftops -d giftops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: {}
